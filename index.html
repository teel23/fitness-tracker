<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitTrack">
  <title>FitTrack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar">
    <h1 class="top-bar__title">FitTrack</h1>
    <button class="top-bar__settings" data-action="navigate" data-tab="settings" aria-label="Settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
      </svg>
    </button>
  </header>

  <!-- Main Content Area -->
  <main id="app-content" class="content">
    <!-- Dashboard Tab -->
    <section id="tab-dashboard" class="tab-content tab-content--active">
      <div class="tab-inner" id="dashboard-content"></div>
    </section>

    <!-- Workout Tab -->
    <section id="tab-workout" class="tab-content">
      <div class="tab-inner" id="workout-content"></div>
    </section>

    <!-- Cardio Tab -->
    <section id="tab-cardio" class="tab-content">
      <div class="tab-inner" id="cardio-content"></div>
    </section>

    <!-- Progress Tab -->
    <section id="tab-progress" class="tab-content">
      <div class="tab-inner" id="progress-content"></div>
    </section>

    <!-- Body Tab -->
    <section id="tab-body" class="tab-content">
      <div class="tab-inner" id="body-content"></div>
    </section>

    <!-- Calendar Tab -->
    <section id="tab-calendar" class="tab-content">
      <div class="tab-inner" id="calendar-content"></div>
    </section>

    <!-- Settings Tab -->
    <section id="tab-settings" class="tab-content">
      <div class="tab-inner" id="settings-content"></div>
    </section>
  </main>

  <!-- Exercise Picker Modal -->
  <div id="exercise-modal" class="modal" hidden>
    <div class="modal__backdrop" data-action="close-exercise-modal"></div>
    <div class="modal__sheet">
      <div class="modal__header">
        <h2 class="modal__title">Select Exercise</h2>
        <button class="modal__close" data-action="close-exercise-modal" aria-label="Close">&times;</button>
      </div>
      <input type="text" id="exercise-search" class="input" placeholder="Search exercises...">
      <div id="exercise-category-filters" class="chip-row">
        <button class="chip chip--active" data-category="all">All</button>
        <button class="chip" data-category="chest">Chest</button>
        <button class="chip" data-category="back">Back</button>
        <button class="chip" data-category="shoulders">Shoulders</button>
        <button class="chip" data-category="arms">Arms</button>
        <button class="chip" data-category="legs">Legs</button>
        <button class="chip" data-category="core">Core</button>
      </div>
      <div id="exercise-list" class="exercise-list"></div>
      <button class="btn btn--outline btn--full" data-action="create-custom-exercise">+ Create Custom Exercise</button>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-dialog" class="modal" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__dialog">
      <p id="confirm-message" class="confirm-message"></p>
      <div class="confirm-actions">
        <button class="btn btn--outline" data-action="confirm-cancel">Cancel</button>
        <button class="btn btn--danger" data-action="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-bar__btn tab-bar__btn--active" data-tab="dashboard">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
      </svg>
      <span class="tab-bar__label">Dashboard</span>
    </button>
    <button class="tab-bar__btn" data-tab="workout">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5h11M6.5 17.5h11M2 12h4M18 12h4M6 6.5V4M6 20v-2.5M18 6.5V4M18 20v-2.5"></path>
        <rect x="6" y="6.5" width="12" height="11" rx="1"></rect>
      </svg>
      <span class="tab-bar__label">Workout</span>
    </button>
    <button class="tab-bar__btn" data-tab="cardio">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <span class="tab-bar__label">Cardio</span>
    </button>
    <button class="tab-bar__btn" data-tab="progress">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
      </svg>
      <span class="tab-bar__label">Progress</span>
    </button>
    <button class="tab-bar__btn" data-tab="body">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span class="tab-bar__label">Body</span>
    </button>
    <button class="tab-bar__btn" data-tab="calendar">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      <span class="tab-bar__label">Calendar</span>
    </button>
    <button class="tab-bar__btn" data-tab="settings">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      <span class="tab-bar__label">Settings</span>
    </button>
  </nav>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <!-- App -->
  <script src="app.js" type="module"></script>
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

</body>
</html>
